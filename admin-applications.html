<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adoption Applications — Admin — Aamal Almoayyed Sanctuary</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="admin-app">
  <header class="admin-topbar">
    <div class="admin-topbar-inner">
      <a href="admin.html" class="admin-brand"><img src="img/logo.png" alt="Aamal Almoayyed Sanctuary for Animals"><span>Staff Admin</span><span class="admin-brand-sub">Aamal Almoayyed Sanctuary for Animals · Run by BARC</span></a>
      <nav class="admin-nav">
        <a href="admin.html">Dashboard</a>
        <a href="admin-animals.html">Animals</a>
        <a href="admin-bookings.html">Bookings</a>
        <a href="admin-applications.html" class="active">Applications</a>
        <a href="admin-assessment.html">Assessment</a>
        <a href="admin-reports.html">Reports</a>
      </nav>
      <button type="button" class="btn btn-ghost btn-sm" id="logoutBtn">🚪 Logout</button>
    </div>
  </header>

  <main class="admin-main">
    <div class="container">
      <div id="toast" class="admin-toast"></div>

      <div class="admin-card">
        <div class="admin-card-head">
          <div>
            <h3>Adoption Applications</h3>
            <p style="margin:4px 0 0;">Review incoming adoption requests and update their status.</p>
          </div>
          <select id="statusFilter">
            <option value="">All statuses</option>
            <option value="Pending Review">Pending Review</option>
            <option value="Approved">Approved</option>
            <option value="Declined">Declined</option>
          </select>
        </div>
        <div id="applicationsTable"></div>
      </div>

    </div>
  </main>
</div>

<div id="appModalOverlay" class="admin-modal-overlay" style="display:none;">
  <div class="admin-modal">
    <div class="admin-modal-head">
      <h3>Application Details</h3>
      <button type="button" class="admin-modal-close" id="closeAppModal">✕</button>
    </div>
    <div id="appModalBody"></div>
  </div>
</div>

<script src="js/pets-data.js"></script>
<script src="js/admin-common.js"></script>
<script src="js/admin-applications.js"></script>
</body>
</html>
