<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Booking Requests — Admin — Aamal Almoayyed Sanctuary</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="admin-app">
  <header class="admin-topbar">
    <div class="admin-topbar-inner">
      <a href="admin.html" class="admin-brand"><img src="img/logo.png" alt="Aamal Almoayyed Sanctuary for Animals"><span>Staff Admin</span><span class="admin-brand-sub">Aamal Almoayyed Sanctuary for Animals · Run by BARC</span></a>
      <nav class="admin-nav">
        <a href="admin.html">Dashboard</a>
        <a href="admin-animals.html">Animals</a>
        <a href="admin-bookings.html" class="active">Bookings</a>
        <a href="admin-applications.html">Applications</a>
        <a href="admin-assessment.html">Assessment</a>
        <a href="admin-reports.html">Reports</a>
      </nav>
      <button type="button" class="btn btn-ghost btn-sm" id="logoutBtn">🚪 Logout</button>
    </div>
  </header>

  <main class="admin-main">
    <div class="container">
      <div id="toast" class="admin-toast"></div>

      <div class="admin-card">
        <div class="admin-card-head">
          <div>
            <h3>Booking Requests</h3>
            <p style="margin:4px 0 0;">Approve, reject and track all animal walk, playtime and grooming bookings.</p>
          </div>
          <select id="bookingStatusFilter">
            <option value="">All statuses</option>
            <option value="Requested">Requested</option>
            <option value="Confirmed">Confirmed</option>
            <option value="Completed">Completed</option>
            <option value="Cancelled">Cancelled</option>
          </select>
        </div>
        <div id="bookingsTable"></div>
      </div>

    </div>
  </main>
</div>

<script src="js/pets-data.js"></script>
<script src="js/admin-common.js"></script>
<script src="js/admin-bookings.js"></script>
</body>
</html>
